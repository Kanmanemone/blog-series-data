name: 티스토리 시리즈 목차 동기화

on:
  # 6시간마다 실행. 처리 대상은 마지막 커트라인 이후 변경분만이라 부담이 크지 않다(plan.md Performance Goals).
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 동기화 스크립트 실행
        run: node scripts/sync-tistory-series/index.js

      - name: 변경 사항 커밋 및 push
        run: |
          # 변경 사항이 없으면(User Story 1 시나리오 2) 아무 것도 하지 않고 종료한다.
          if [ -z "$(git status --porcelain)" ]; then
            echo "변경 사항 없음 - 커밋을 건너뜁니다."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- '*_series.json' .github/sync-state.json
          git commit -m "chore: 티스토리 시리즈 목차 동기화"

          # 병합 검토 없이 기본 브랜치로 즉시 push한다(spec.md Clarifications Session 2026-07-22).
          # 다른 실행과 겹쳐 push가 거부되면 자동 재시도 없이 이 스텝을 실패로 종료한다 —
          # 다음 예약 실행이나 관리자의 수동 재실행으로 자연히 복구된다(Edge Cases 참고).
          if ! git push; then
            echo "push 실패 - 다른 실행과 겹쳤을 수 있습니다. 재시도하지 않고 실패로 종료합니다." >&2
            exit 1
          fi
